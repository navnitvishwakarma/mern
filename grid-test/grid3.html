<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid 3</title>
</head>

<body>
    <div class="container">
        <div class="d" id="id1">1</div>
        <div class="d" id="id2">2</div>
        <div class="d" id="id3">3</div>
        <div class="d" id="id4">4</div>
        <div class="d" id="id5">5</div>
        <div class="d" id="id6">6</div>
        <div class="d" id="id7">7</div>
        <div class="d" id="id8">8</div>
        <div class="d" id="id9">9</div>
        
    </div>


</body>

<style>
    .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        border: 2px solid black;
        grid-template-rows: repeat(4, 1fr);
        grid-template-columns: repeat(4, 1fr);
        width: 25%;
        margin: auto;
    }
  .d {
        background-color: lightblue;
        border: 1px solid black;
        padding: 20px;
        text-align: center;
        margin: 5px;
    }
   
   #id2{
    grid-area: 1 / 2 / 3 / 4;
   }
   #id6{
    /* grid-column: span 2; */
    grid-area: 3 / 1 / 4 / 3;
   }
   #id7{
    grid-area: 3 / 3 / 4 / 5;
   }
   #id9{
    grid-area: 4 / 2 / 5 / 5;
   }
</style>

</html>
