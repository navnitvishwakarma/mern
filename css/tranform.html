<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
</head>
<body>
    <div class="box"></div>
    
</body>
<style>
    body{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

   
    .box{
        
        width: 100px;
        height: 100px;
        background-color: rgb(255, 0, 0);
        
        margin: 50px auto;
        transition: all 0.5s ease-in-out;
    }
    .box:hover{
        transform: rotate(45deg) scale(2.5);
        border-radius: 50%;
        background-color: rgb(1, 120, 9);
    }
</style>
</html>
