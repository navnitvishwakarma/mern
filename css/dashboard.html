<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard</title>
</head>
<body>
    <div class="outerBox" id="outerBox">
        <div class="box1" id="box1">1</div>
        <div class="box2" id="box2">2</div>
        <div class="box3" id="box3">

            <div class="box31" id="box31">3.1</div>
            <div class="box32" id="box32">3.2</div>
            <div class="box33" id="box33">3.3</div>
            <div class="box34" id="box34">3.4</div>
            <div class="box35" id="box35">3.5</div>
            <div class="box36" id="box36">3.6</div>

        </div>
    </div>
</body>

<style>
    #outerBox{
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(6, 1fr);
        border: 2px solid black;
        width: 99vw;
        height:99vh;
        gap: 10px;
        padding: 10px;
    }

    #box1{
        background-color: red;
        
      grid-area: 1 / 1 / 3 / 2;
      grid-row: span 6;
        width: 100%;
        height: 100%;
    }
    #box2{
        background-color: blue;
        width: 100%;
        height: 100%;
        grid-column: span 4;
    }
    #box3{
        background-color: green;
        width: 98.4% ;
        height: 96.8%;
        grid-column: span 4;
        grid-row: span 5;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 10px;
        padding: 10px;
    }

    #box31{
        background-color: aqua;
        

    }
    #box32{
        background-color: aqua;
    }
    #box33{
        background-color: aqua;
    }
    #box34{
        background-color: aqua;
    }
    #box35{
        background-color: aqua;
        grid-column: span 2;
    }
    #box36{
        background-color: aqua;
        grid-column: span 2;

    }

    
</style>
</html>
