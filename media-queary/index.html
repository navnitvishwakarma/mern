<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive</title>
</head>
<body>
  <!-- creating navbar -->
   <div class="navbar">
    <div class="logo">Logo</div>
    <button class="breadcrumb-btn" onclick="toggleBreadcrumb()">☰</button>
    <ul class="nav-links">
      <li>Home</li>
      <li>About</li>
      <li>Services</li>
      <li>Contact</li>
    </ul>
  </div>

  <!-- breadcrumb navigation -->
  <div class="breadcrumb" id="breadcrumb">
    <li>Home</li>
    <li>About</li>   
    <li>Services</li>
    <li>Contact</li>
  </div>

 
</body>
<style>
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 10px 20px;
    }

    .logo {
        color: #fff;
        font-size: 24px;
        font-weight: bold;
    }

    .nav-links {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
        
    }
    li {
        margin-left: 20px;
        color: #fff;
    }

    .breadcrumb-btn {
        display: none;
        background: none;
        border: none;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
    }

    .breadcrumb {
        display: none;
        padding: 10px 20px;
        background-color: #444;
        color: #fff;
        font-size: 14px;
        list-style: none;
    }

    .breadcrumb a {
        color: #4CAF50;
        text-decoration: none;
    }

    .breadcrumb a:hover {
        text-decoration: underline;
    }



    @media (max-width: 573px) {
        .breadcrumb-btn {
            display: block;
        }

        .nav-links {
            display: none;
           
        }
        

        .breadcrumb {
            display: block;
          
           
        }
    }



</style>

<script>
    function toggleBreadcrumb() {
        const breadcrumb = document.getElementById('breadcrumb');
        breadcrumb.style.display = breadcrumb.style.display === 'none' ? 'block' : 'none';
    }
</script>

</html>
